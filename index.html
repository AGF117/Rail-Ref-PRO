<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ff8a00">
  <title>RailRef PRO</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div id="app">
<header class="topbar">
  <h1>🚆 RailRef <span>PRO</span></h1>
  <button id="settingsButton">⚙</button>
</header>

<section class="search-section">
  <input id="searchInput" type="search"
         placeholder="Buscar referencia, descripción o fabricante...">
</section>

<section class="quick-actions">
  <button>⭐ Favoritos</button>
  <button>📚 Manuales</button>
  <button>🚂 Locomotoras</button>
  <button>📦 Repuestos</button>
</section>

<section class="results-section">
  <h2>Resultados</h2>
  <div id="resultsContainer">
    <p>Introduce una referencia para comenzar.</p>
  </div>
</section>
</div>

<nav class="bottom-nav">
  <button>🏠 Inicio</button>
  <button>🔍 Buscar</button>
  <button>⭐ Favoritos</button>
  <button>📚 Manuales</button>
  <button>⚙ Ajustes</button>
</nav>

<script src="js/app.js"></script>
</body>
</html>
