<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RailRef PRO</title>

    <meta name="theme-color" content="#ff8c00">

    <meta name="description"
          content="Consulta de referencias ferroviarias">

    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="css/main.css">

</head>

<body>

<div id="app">

    <!-- ===================================
         CABECERA
    ==================================== -->

    <header class="topbar">

        <div class="brand">

            <div class="logo">🚆</div>

            <div>

                <h1>RailRef <span>PRO</span></h1>

                <small>Mantenimiento ferroviario</small>

            </div>

        </div>

        <button id="settingsButton" class="icon-btn">

            ⚙

        </button>

    </header>



    <!-- ===================================
         BUSCADOR
    ==================================== -->

    <section class="search-section">

        <input
            id="searchInput"
            type="search"
            placeholder="Buscar referencia, descripción, fabricante..."
            autocomplete="off">

    </section>



    <!-- ===================================
         ACCESOS RÁPIDOS
    ==================================== -->

    <section class="quick-actions">

        <button class="quick-card">

            ⭐

            <span>Favoritos</span>

        </button>

        <button class="quick-card">

            📚

            <span>Manuales</span>

        </button>

        <button class="quick-card">

            🚂

            <span>Locomotoras</span>

        </button>

        <button class="quick-card">

            📦

            <span>Repuestos</span>

        </button>

    </section>



    <!-- ===================================
         RESULTADOS
    ==================================== -->

    <section class="results-section">

        <h2>Resultados</h2>

        <div id="resultsContainer">

            <div class="empty">

                Introduce una referencia...

            </div>

        </div>

    </section>

</div>



<!-- ===================================
     PANEL DE DETALLE
==================================== -->

<div id="detailPanel" class="detail-panel">

    <div id="detailContent">

    </div>

    <button id="closeDetail" class="close-btn">

        Cerrar

    </button>

</div>



<!-- ===================================
     NAVEGACIÓN
==================================== -->

<nav class="bottom-nav">

    <button class="active">

        🏠

        <span>Inicio</span>

    </button>

    <button>

        🔍

        <span>Buscar</span>

    </button>

    <button>

        ⭐

        <span>Favoritos</span>

    </button>

    <button>

        📚

        <span>Manuales</span>

    </button>

    <button>

        ⚙

        <span>Ajustes</span>

    </button>

</nav>



<!-- ===================================
     JAVASCRIPT
==================================== -->

<script src="js/database.js"></script>

<script src="js/search.js"></script>

<script src="js/ui.js"></script>

<script src="js/app.js"></script>

</body>

</html>
